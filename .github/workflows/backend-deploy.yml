name: Spring Boot Backend Build and Deploy (GCP Cloud Run)

on:
  push:
    branches:
      - dev
      - qa
      - main
    paths:
      - '**'
  workflow_dispatch:

concurrency:
  group: backend-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: gradle

      - name: Set GCP Environment Variables
        id: set-env
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME}"

          case "${BRANCH}" in
            dev)
              ENV_NAME="dev"
              GCP_PROJECT="${{ secrets.GCP_DEV_PROJECT_ID }}"
              GCP_PROJECT_NUMBER="${{ secrets.GCP_DEV_PROJECT_NUMBER }}"
              GCR_TAG="dev-${GITHUB_SHA}"
              CLOUD_RUN_SERVICE="${{ secrets.GCP_DEV_CLOUD_RUN_SERVICE }}"
              REGION="${{ secrets.GCP_DEV_REGION }}"
              ;;
            qa)
              ENV_NAME="qa"
              GCP_PROJECT="${{ secrets.GCP_QA_PROJECT_ID }}"
              GCP_PROJECT_NUMBER="${{ secrets.GCP_QA_PROJECT_NUMBER }}"
              GCR_TAG="qa-${GITHUB_SHA}"
              CLOUD_RUN_SERVICE="${{ secrets.GCP_QA_CLOUD_RUN_SERVICE }}"
              REGION="${{ secrets.GCP_QA_REGION }}"
              ;;
            main)
              ENV_NAME="prod"
              GCP_PROJECT="${{ secrets.GCP_PROD_PROJECT_ID }}"
              GCP_PROJECT_NUMBER="${{ secrets.GCP_PROD_PROJECT_NUMBER }}"
              GCR_TAG="prod-${GITHUB_SHA}"
              CLOUD_RUN_SERVICE="${{ secrets.GCP_PROD_CLOUD_RUN_SERVICE }}"
              REGION="${{ secrets.GCP_PROD_REGION }}"
              ;;
            *)
              echo "Unsupported branch for deployment: ${BRANCH}" >&2
              exit 1
              ;;
          esac

          echo "ENV_NAME=${ENV_NAME}" >> "$GITHUB_ENV"
          echo "GCP_PROJECT=${GCP_PROJECT}" >> "$GITHUB_ENV"
          echo "GCP_PROJECT_NUMBER=${GCP_PROJECT_NUMBER}" >> "$GITHUB_ENV"
          echo "GCR_TAG=${GCR_TAG}" >> "$GITHUB_ENV"
          echo "CLOUD_RUN_SERVICE=${CLOUD_RUN_SERVICE}" >> "$GITHUB_ENV"
          echo "REGION=${REGION}" >> "$GITHUB_ENV"
          echo "IMAGE_URL=gcr.io/${GCP_PROJECT}/howzy-backend-api:${GCR_TAG}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'deploy-sa@${{ env.GCP_PROJECT }}.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Configure Docker to use gcloud as credential helper
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and Push Docker Image (Jib)
        run: ./gradlew jib --image=${{ env.IMAGE_URL }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          image: ${{ env.IMAGE_URL }}
          region: ${{ env.REGION }}
          env_vars: |
            SPRING_PROFILES_ACTIVE=${{ env.ENV_NAME }}
