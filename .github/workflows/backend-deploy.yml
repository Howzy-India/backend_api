name: Spring Boot Backend Build and Deploy (GCP Cloud Run)

on:
  push:
    branches:
      - develop
      - test
      - main
    paths:
      - '**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: gradle

      - name: Set GCP Environment Variables
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "GCP_PROJECT=your-dev-project-id" >> $GITHUB_ENV
            echo "GCR_TAG=dev-${{ github.sha }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/test" ]]; then
            echo "ENV_NAME=test" >> $GITHUB_ENV
            echo "GCP_PROJECT=your-test-project-id" >> $GITHUB_ENV
            echo "GCR_TAG=test-${{ github.sha }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "GCP_PROJECT=your-prod-project-id" >> $GITHUB_ENV
            echo "GCR_TAG=prod-${{ github.sha }}" >> $GITHUB_ENV
          fi
          echo "IMAGE_URL=gcr.io/${GCP_PROJECT}/howzy-backend-api:${GCR_TAG}" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'deploy-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Configure Docker to use gcloud as credential helper
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and Push Docker Image (Jib)
        run: ./gradlew jib --image=${{ env.IMAGE_URL }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: howzy-backend-api
          image: ${{ env.IMAGE_URL }}
          region: us-central1
          env_vars: |
            SPRING_PROFILES_ACTIVE=${{ env.ENV_NAME }}
