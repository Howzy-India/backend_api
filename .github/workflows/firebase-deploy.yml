name: Firebase Functions Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-deploy-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set Firebase Project
        shell: bash
        run: |
          FIREBASE_PROJECT="${{ secrets.FIREBASE_PROJECT_PROD }}"
          # Fallback to howzy-api if prod secret is not configured
          if [ -z "${FIREBASE_PROJECT}" ]; then
            echo "WARNING: FIREBASE_PROJECT_PROD not set, falling back to howzy-api"
            FIREBASE_PROJECT="howzy-api"
          fi
          echo "Deploying to Firebase project: ${FIREBASE_PROJECT}"
          echo "FIREBASE_PROJECT=${FIREBASE_PROJECT}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/923565373621/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions-deploy@howzy-api.iam.gserviceaccount.com

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify credentials and secret access
        run: |
          echo "Active identity:"
          gcloud auth list
          echo "Resolved project: $FIREBASE_PROJECT"
          echo "Project number:"
          gcloud projects describe "$FIREBASE_PROJECT" --format="value(projectNumber)"
          echo "Testing secret access:"
          gcloud secrets versions access 1 --secret=HOWZY_BOOTSTRAP_KEY --project="$FIREBASE_PROJECT" > /dev/null \
            && echo "Secret access: OK" \
            || echo "Secret access: FAILED"

      - name: Deploy to Firebase Functions
        run: firebase deploy --only functions --project "$FIREBASE_PROJECT" --non-interactive

      - name: Deploy Firestore Indexes
        run: firebase deploy --only firestore:indexes --project "$FIREBASE_PROJECT" --non-interactive
