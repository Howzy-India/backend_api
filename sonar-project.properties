sonar.projectKey=Howzy-India_backend_api
sonar.organization=howzy-india
sonar.projectName=backend_api
sonar.projectVersion=1.0
sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.exclusions=**/node_modules/**,**/lib/**,**/*.test.ts,**/*.spec.ts,**/__mocks__/**

# API routes and Cloud Function entry points are integration-layer code;
# exclude from coverage requirement (unit-testable logic lives in src/lib/)
sonar.coverage.exclusions=src/api/**,src/functions/**,src/index.ts,src/types/**

sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
