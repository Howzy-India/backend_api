sonar.projectKey=Howzy-India_backend_api
sonar.organization=howzy-india
sonar.projectName=backend_api
sonar.projectVersion=1.0
sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.exclusions=**/node_modules/**,**/lib/**,**/*.test.ts,**/*.spec.ts,**/__mocks__/**

# API routes and middleware are integration-layer code (Firebase + HTTP);
# unit-testable logic lives in src/lib/ which is fully covered.
sonar.coverage.exclusions=**/api/**,**/middleware/**,**/functions/**,**/types/**,src/index.ts

sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
