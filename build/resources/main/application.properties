spring.application.name=api
server.port=8080

# Database Configuration (Cloud SQL - PostgreSQL)
# These will be overridden by environment variables in GCP Cloud Run
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/howzydb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# OAuth2 Resource Server Configuration (Google Cloud Identity Platform / Firebase)
# Replace with actual projectId
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://securetoken.google.com/${GCP_PROJECT_ID:your-gcp-project-id}

# Swagger UI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
